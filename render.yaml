services:
  - type: web
    name: btc-compass
    runtime: python
    rootDir: .
    buildCommand: pip install -r btc_web/requirements.txt
    # 不要加 --preload: 模块级预热/回填线程会跑在 gunicorn master 进程里,
    # 预热的是 master 的内存缓存而非 worker 的, 且与 worker 的历史写入跨进程竞态
    # (2026-07 复查修复; score_history 另有 fcntl 文件锁兜底)
    startCommand: cd btc_web && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      # 决策提醒推送渠道 (换档/战术极值); 两个都不设则提醒功能静默禁用, 任一即可
      - key: WECOM_WEBHOOK_URL      # 企业微信群机器人 webhook
        sync: false
      - key: SERVERCHAN_SENDKEY     # Server酱³ SendKey → 个人微信
        sync: false
      # BlockBeats 快讯签名凭据 (只读公开新闻 GET); 不设则回退代码内置 demo 键, 设置即可轮换
      - key: BLOCKBEATS_APP_KEY
        sync: false
      - key: BLOCKBEATS_APP_SECRET
        sync: false
    plan: free
